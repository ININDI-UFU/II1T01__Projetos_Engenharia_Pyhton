<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GrapesJS Editor — Projetos de Engenharia</title>
  <!-- GrapesJS CSS -->
  <link rel="stylesheet" href="https://unpkg.com/grapesjs@0.21.13/dist/css/grapes.min.css" />
  <style>
    body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; }
    #gjs { height: 100vh; overflow: hidden; }
    /* Painel superior com marca */
    .gjs-pn-panel.gjs-pn-devices-c { padding-left: 10px; }
    .editor-title {
      display: inline-flex; align-items: center; gap: 8px;
      font-family: sans-serif; font-size: 14px; font-weight: 600; color: #ddd;
    }
  </style>
</head>
<body>

  <!-- Container do Editor GrapesJS -->
  <div id="gjs"></div>

  <!-- GrapesJS JS -->
  <script src="https://unpkg.com/grapesjs@0.21.13"></script>
  <!-- Plugin de blocos básicos -->
  <script src="https://unpkg.com/grapesjs-blocks-basic@1.0.2"></script>

  <script>
    const editor = grapesjs.init({
      container: '#gjs',
      fromElement: false,
      height: '100%',
      width: 'auto',
      storageManager: {
        type: 'local',        // salva automaticamente no localStorage
        autosave: true,
        autoload: true,
        stepsBeforeSave: 1,
        id: 'gjs-einindi-',   // prefixo das chaves no localStorage
      },
      plugins: ['gjs-blocks-basic'],
      pluginsOpts: {
        'gjs-blocks-basic': {
          flexGrid: true,
        },
      },
      canvas: {
        styles: ['style.css'],  // carrega seu CSS existente no canvas
      },
      // Conteúdo padrão carregado quando não há dados salvos
      components: `
  <!-- ================================================================
       SLIDE 5 — ESQUEM&Aacute;TICO DO CIRCUITO
       ================================================================ -->
  <section class="slide" data-slide="5">
    <span class="slide-number">05 / 15</span>
    <h1 class="slide-title">Esquem&aacute;tico do Circuito Condicionador</h1>

    <div class="two-col">
      <div class="schematic">
        <svg viewBox="0 0 560 420" xmlns="http://www.w3.org/2000/svg" style="width:100%; max-width:560px;">
          <circle cx="70" cy="220" r="35" fill="none" stroke="#00d4ff" stroke-width="2.5"/>
          <text x="70" y="212" text-anchor="middle" fill="#fff" font-size="14" font-weight="700">220V</text>
          <text x="70" y="230" text-anchor="middle" fill="#fff" font-size="11" font-weight="600">RMS</text>
          <text x="70" y="275" text-anchor="middle" fill="rgba(245,245,247,0.5)" font-size="11">Entrada CA</text>
          <line x1="105" y1="220" x2="150" y2="220" stroke="rgba(245,245,247,0.4)" stroke-width="2"/>
          <rect x="150" y="195" width="100" height="50" rx="8" fill="rgba(41,151,255,0.12)" stroke="#ff9f0a" stroke-width="2"/>
          <text x="200" y="225" text-anchor="middle" fill="#fff" font-size="16" font-weight="700">R3</text>
          <text x="200" y="262" text-anchor="middle" fill="rgba(245,245,247,0.5)" font-size="10">S&eacute;rie com entrada</text>
          <line x1="250" y1="220" x2="320" y2="220" stroke="rgba(245,245,247,0.4)" stroke-width="2"/>
          <circle cx="320" cy="220" r="5" fill="#f5f5f7"/>
          <line x1="320" y1="215" x2="320" y2="175" stroke="rgba(245,245,247,0.4)" stroke-width="2"/>
          <rect x="290" y="110" width="60" height="65" rx="8" fill="rgba(41,151,255,0.12)" stroke="#2997ff" stroke-width="2"/>
          <text x="320" y="148" text-anchor="middle" fill="#fff" font-size="16" font-weight="700">R1</text>
          <line x1="320" y1="110" x2="320" y2="70" stroke="rgba(245,245,247,0.4)" stroke-width="2"/>
          <rect x="285" y="55" width="70" height="28" rx="8" fill="rgba(48,209,88,0.2)" stroke="#30d158" stroke-width="1.5"/>
          <text x="320" y="74" text-anchor="middle" fill="#30d158" font-size="13" font-weight="700">+Vcc (5V)</text>
          <line x1="320" y1="225" x2="320" y2="280" stroke="rgba(245,245,247,0.4)" stroke-width="2"/>
          <rect x="290" y="280" width="60" height="65" rx="8" fill="rgba(191,90,242,0.12)" stroke="#bf5af2" stroke-width="2"/>
          <text x="320" y="318" text-anchor="middle" fill="#fff" font-size="16" font-weight="700">R2</text>
          <line x1="320" y1="345" x2="320" y2="375" stroke="rgba(245,245,247,0.4)" stroke-width="2"/>
          <rect x="290" y="375" width="60" height="25" rx="6" fill="rgba(255,159,10,0.15)" stroke="#ff9f0a" stroke-width="1.5"/>
          <text x="320" y="392" text-anchor="middle" fill="#ff9f0a" font-size="12" font-weight="700">GND</text>
          <line x1="320" y1="220" x2="385" y2="220" stroke="rgba(245,245,247,0.4)" stroke-width="2"/>
          <rect x="385" y="198" width="75" height="44" rx="10" fill="rgba(255,159,10,0.12)" stroke="#ff9f0a" stroke-width="2"/>
          <text x="422" y="216" text-anchor="middle" fill="#fff" font-size="14" font-weight="700">Vout</text>
          <text x="422" y="234" text-anchor="middle" fill="rgba(245,245,247,0.6)" font-size="11">0 &ndash; 5 V</text>
          <line x1="460" y1="220" x2="480" y2="220" stroke="#ff9f0a" stroke-width="2" marker-end="url(#arrow5)"/>
          <rect x="480" y="195" width="70" height="50" rx="10" fill="rgba(48,209,88,0.12)" stroke="#30d158" stroke-width="2"/>
          <text x="515" y="214" text-anchor="middle" fill="#fff" font-size="12" font-weight="700">ADC</text>
          <text x="515" y="230" text-anchor="middle" fill="rgba(245,245,247,0.5)" font-size="9">Conversor A/D</text>
          <line x1="70" y1="255" x2="70" y2="380" stroke="rgba(245,245,247,0.3)" stroke-width="1.5"/>
          <line x1="55" y1="380" x2="85" y2="380" stroke="rgba(245,245,247,0.4)" stroke-width="2"/>
          <line x1="60" y1="386" x2="80" y2="386" stroke="rgba(245,245,247,0.3)" stroke-width="1.5"/>
          <line x1="65" y1="392" x2="75" y2="392" stroke="rgba(245,245,247,0.2)" stroke-width="1"/>
          <defs>
            <marker id="arrow5" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
              <polygon points="0 0, 8 3, 0 6" fill="#ff9f0a"/>
            </marker>
          </defs>
        </svg>
      </div>
      <div>
        <div class="info-panel">
          <h4>FUN&Ccedil;&Atilde;O DOS COMPONENTES</h4>
          <div class="component-list">
            <div class="component-item">
              <strong style="color:var(--accent);">R3 (S&eacute;rie)</strong>
              <p>Atenua o sinal CA. Forma divisor de tens&atilde;o com R1&#8214;R2.</p>
            </div>
            <div class="component-item">
              <strong style="color:var(--accent-green);">R1 (para Vcc)</strong>
              <p>Introduz offset CC positivo. Eleva o sinal para faixa 0-5V.</p>
            </div>
            <div class="component-item">
              <strong style="color:var(--accent-red);">R2 (para GND)</strong>
              <p>Completa divisor de tens&atilde;o. R2 = R1 simplifica o c&aacute;lculo.</p>
            </div>
            <div class="component-item">
              <strong style="color:var(--accent-purple);">Vout</strong>
              <p>Vcc + ganho_CA &times; Vpico. Deve ficar entre 0V e 5V.</p>
            </div>
          </div>
        </div>
      </div>
    </div>
  </section>

  <!-- ================================================================
       SLIDE 6 — DERIVA&Ccedil;&Atilde;O MATEM&Aacute;TICA
       ================================================================ -->
  <section class="slide" data-slide="6">
    <span class="slide-number">06 / 15</span>
    <h1 class="slide-title">Deriva&ccedil;&atilde;o Matem&aacute;tica do Circuito</h1>

    <div class="card-grid card-grid--2" style="margin-top: 8px;">
      <div class="card">
        <div style="display:flex; align-items:center; gap:12px; margin-bottom:12px;">
          <span class="step-badge">1</span>
          <h3 style="margin:0;">ETAPA 1: CONVERS&Atilde;O RMS &rarr; PICO</h3>
        </div>
        <p class="card-desc">O valor RMS &eacute; o valor eficaz da tens&atilde;o CA senoidal. Para obter o valor de pico:</p>
        <div class="formula-box" style="margin-top:8px;">V<sub>pico</sub> = V<sub>RMS</sub> &times; &radic;2</div>
        <p class="card-desc" style="margin-top:8px;">220 &times; 1,4142 &asymp; <strong style="color:var(--accent-teal);">311,13 V</strong></p>
      </div>

      <div class="card">
        <div style="display:flex; align-items:center; gap:12px; margin-bottom:12px;">
          <span class="step-badge">2</span>
          <h3 style="margin:0;">ETAPA 2: GANHO CA &mdash; DIVISOR DE TENS&Atilde;O</h3>
        </div>
        <p class="card-desc">Para o sinal CA, Vcc &eacute; curto-circuito (fonte ideal). R1 e R2 ficam em paralelo:</p>
        <div class="formula-box" style="margin-top:8px;">R1&#8214;R2 = (R1 &times; R2) / (R1 + R2)</div>
        <p class="card-desc" style="margin-top:8px;">O ganho CA real do divisor R3 + (R1&#8214;R2):</p>
        <div class="formula-box">G<sub>CA</sub> = R1&#8214;R2 / (R3 + R1&#8214;R2)</div>
      </div>

      <div class="card">
        <div style="display:flex; align-items:center; gap:12px; margin-bottom:12px;">
          <span class="step-badge">3</span>
          <h3 style="margin:0;">ETAPA 3: OFFSET CC &mdash; N&Iacute;VEL DC</h3>
        </div>
        <p class="card-desc">Para CC, a entrada CA &eacute; zero. O offset vem de Vcc atrav&eacute;s de R1. R3 e R2 ficam em paralelo vistos de R1:</p>
        <div class="formula-box" style="margin-top:8px;">V<sub>CC</sub> = [R3&#8214;R2 / (R1 + R3&#8214;R2)] &times; Vcc</div>
        <p class="card-desc" style="margin-top:8px;">Este n&iacute;vel DC desloca a senoide para que o vale fique pr&oacute;ximo de 0V.</p>
      </div>

      <div class="card">
        <div style="display:flex; align-items:center; gap:12px; margin-bottom:12px;">
          <span class="step-badge">4</span>
          <h3 style="margin:0;">ETAPA 4: SA&Iacute;DA FINAL COMBINADA</h3>
        </div>
        <p class="card-desc">Superposi&ccedil;&atilde;o: somamos a componente CA atenuada com o offset CC:</p>
        <div class="formula-box" style="margin-top:8px;">V<sub>out</sub> = V<sub>CC</sub> + G<sub>CA</sub> &times; V<sub>pico</sub></div>
        <p class="card-desc" style="margin-top:8px;">Crit&eacute;rio: <strong style="color:var(--accent-green);">0 &le; V<sub>out</sub> &le; 5V</strong> para compatibilidade com ADC.</p>
      </div>
    </div>
  </section>
  <!-- ================================================================
       SLIDE 7 — ESTRAT&Eacute;GIA COMPUTACIONAL
       ================================================================ -->
  <section class="slide" data-slide="7">
    <span class="slide-number">07 / 15</span>
    <h1 class="slide-title">Estrat&eacute;gia Computacional</h1>

    <div class="strategy-grid">
      <div class="strategy-card">
        <div class="strategy-bar" style="background:var(--accent);"></div>
        <div class="strategy-number" style="color:var(--accent);">01</div>
        <div class="strategy-title">Definir Par&acirc;metros</div>
        <div class="strategy-desc">Faixa de sa&iacute;da, tens&atilde;o de entrada RMS e n&uacute;mero de tentativas</div>
      </div>
      <div class="strategy-arrow">&rarr;</div>
      <div class="strategy-card">
        <div class="strategy-bar" style="background:var(--accent-purple);"></div>
        <div class="strategy-number" style="color:var(--accent-purple);">02</div>
        <div class="strategy-title">Gerar Resistores</div>
        <div class="strategy-desc">Lista de valores comerciais a partir de s&eacute;rie base &times; d&eacute;cadas</div>
      </div>
      <div class="strategy-arrow">&rarr;</div>
      <div class="strategy-card">
        <div class="strategy-bar" style="background:var(--accent-red);"></div>
        <div class="strategy-number" style="color:var(--accent-red);">03</div>
        <div class="strategy-title">Calcular Ganho</div>
        <div class="strategy-desc">Ganho CA, offset CC e sa&iacute;da final para cada combina&ccedil;&atilde;o</div>
      </div>
      <div class="strategy-arrow">&rarr;</div>
      <div class="strategy-card">
        <div class="strategy-bar" style="background:var(--accent-green);"></div>
        <div class="strategy-number" style="color:var(--accent-green);">04</div>
        <div class="strategy-title">Filtrar Circuitos</div>
        <div class="strategy-desc">Validar por crit&eacute;rios el&eacute;tricos e faixa de opera&ccedil;&atilde;o</div>
      </div>
    </div>

    <div class="note-box note-box--info" style="margin-top: 32px;">
      <span class="note-box-icon">&#128211;</span>
      <span>Notebook estruturado para convers&atilde;o em slides via <code style="color:var(--accent-teal); background:rgba(0,0,0,0.3); padding:2px 8px; border-radius:4px;">nbconvert --to slides</code></span>
    </div>
  </section>

  <!-- ================================================================
       SLIDE 8 — FLUXOGRAMA DO ALGORITMO
       ================================================================ -->
  <section class="slide" data-slide="8">
    <span class="slide-number">08 / 15</span>
    <h1 class="slide-title">Fluxograma do Algoritmo de Busca</h1>

    <div class="flowchart-container">
      <svg viewBox="0 0 700 520" xmlns="http://www.w3.org/2000/svg" style="max-width: 700px; width: 100%;">
        <rect x="250" y="10" width="200" height="40" rx="20" fill="rgba(0,212,255,0.2)" stroke="#00d4ff" stroke-width="2"/>
        <text x="350" y="35" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">IN&Iacute;CIO</text>
        <line x1="350" y1="50" x2="350" y2="75" stroke="rgba(245,245,247,0.3)" stroke-width="2" marker-end="url(#arrowF)"/>
        <polygon points="350,75 480,130 350,185 220,130" fill="rgba(255,159,10,0.1)" stroke="#ff9f0a" stroke-width="2"/>
        <text x="350" y="128" text-anchor="middle" fill="#ff9f0a" font-size="13" font-weight="700">i &lt; max_tentativas?</text>
        <text x="500" y="125" fill="#ff453a" font-size="12" font-weight="700">N&Atilde;O</text>
        <line x1="480" y1="130" x2="580" y2="130" stroke="#ff453a" stroke-width="2" marker-end="url(#arrowRed)"/>
        <rect x="580" y="105" width="110" height="50" rx="25" fill="rgba(255,69,58,0.15)" stroke="#ff453a" stroke-width="2"/>
        <text x="635" y="127" text-anchor="middle" fill="#fff" font-size="12" font-weight="700">FIM</text>
        <text x="635" y="143" text-anchor="middle" fill="#ff453a" font-size="10">Ordenar DataFrame</text>
        <text x="360" y="200" fill="#30d158" font-size="12" font-weight="700">SIM</text>
        <line x1="350" y1="185" x2="350" y2="215" stroke="rgba(245,245,247,0.3)" stroke-width="2" marker-end="url(#arrowF)"/>
        <rect x="230" y="215" width="240" height="45" rx="8" fill="rgba(0,212,255,0.1)" stroke="#00d4ff" stroke-width="2"/>
        <text x="350" y="233" text-anchor="middle" fill="#fff" font-size="12" font-weight="700">Sortear R1, R2, R3</text>
        <text x="350" y="250" text-anchor="middle" fill="rgba(245,245,247,0.5)" font-size="10">(resistores comerciais)</text>
        <line x1="350" y1="260" x2="350" y2="280" stroke="rgba(245,245,247,0.3)" stroke-width="2" marker-end="url(#arrowF)"/>
        <rect x="230" y="280" width="240" height="45" rx="8" fill="rgba(255,159,10,0.1)" stroke="#ff9f0a" stroke-width="2"/>
        <text x="350" y="300" text-anchor="middle" fill="#fff" font-size="12" font-weight="700">Calcular ganho CA,</text>
        <text x="350" y="316" text-anchor="middle" fill="#fff" font-size="12" font-weight="700">offset CC, Vout</text>
        <line x1="350" y1="325" x2="350" y2="350" stroke="rgba(245,245,247,0.3)" stroke-width="2" marker-end="url(#arrowF)"/>
        <polygon points="350,350 470,395 350,440 230,395" fill="rgba(48,209,88,0.08)" stroke="#30d158" stroke-width="2"/>
        <text x="350" y="393" text-anchor="middle" fill="#30d158" font-size="12" font-weight="700">circuito_valido()?</text>
        <text x="490" y="390" fill="#ff453a" font-size="12" font-weight="700">N&Atilde;O</text>
        <line x1="470" y1="395" x2="540" y2="395" stroke="#ff453a" stroke-width="2" marker-end="url(#arrowRed)"/>
        <text x="580" y="393" fill="rgba(245,245,247,0.5)" font-size="12">Descartar</text>
        <text x="360" y="455" fill="#30d158" font-size="12" font-weight="700">SIM</text>
        <line x1="350" y1="440" x2="350" y2="460" stroke="rgba(245,245,247,0.3)" stroke-width="2" marker-end="url(#arrowF)"/>
        <rect x="270" y="460" width="160" height="40" rx="8" fill="rgba(48,209,88,0.12)" stroke="#30d158" stroke-width="2"/>
        <text x="350" y="475" text-anchor="middle" fill="#fff" font-size="11" font-weight="600">Armazenar em</text>
        <text x="350" y="492" text-anchor="middle" fill="#30d158" font-size="11" font-weight="600">circuitos_encontrados[]</text>
        <line x1="350" y1="500" x2="350" y2="510" stroke="rgba(245,245,247,0.3)" stroke-width="2"/>
        <rect x="290" y="508" width="120" height="25" rx="6" fill="rgba(191,90,242,0.1)" stroke="#bf5af2" stroke-width="1.5"/>
        <text x="350" y="525" text-anchor="middle" fill="#bf5af2" font-size="11" font-weight="600">i = i + 1</text>
        <line x1="290" y1="520" x2="160" y2="520" stroke="rgba(245,245,247,0.2)" stroke-width="1.5"/>
        <line x1="160" y1="520" x2="160" y2="130" stroke="rgba(245,245,247,0.2)" stroke-width="1.5"/>
        <line x1="160" y1="130" x2="220" y2="130" stroke="rgba(245,245,247,0.2)" stroke-width="1.5" marker-end="url(#arrowF)"/>
        <defs>
          <marker id="arrowF" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
            <polygon points="0 0, 8 3, 0 6" fill="rgba(245,245,247,0.3)"/>
          </marker>
          <marker id="arrowRed" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
            <polygon points="0 0, 8 3, 0 6" fill="#ff453a"/>
          </marker>
        </defs>
      </svg>
    </div>
  </section>
  <!-- ================================================================
       SLIDE 9 — ARQUITETURA DO SOFTWARE
       ================================================================ -->
  <section class="slide" data-slide="9">
    <span class="slide-number">09 / 15</span>
    <h1 class="slide-title">Arquitetura do Software</h1>

    <div class="arch-diagram">
      <div class="arch-col">
        <div class="arch-header arch-header--input">ENTRADA &mdash; Par&acirc;metros</div>
        <div class="arch-item">entrada_rms = 220.0<br>saida_desejada = [5.0, 0.0]</div>
        <div class="arch-item">max_tentativas = 8000<br>random.seed(42)</div>
        <div class="arch-item">resistores_comerciais[]<br>161 valores (E24 &times; d&eacute;cadas)</div>
      </div>
      <div class="arch-col">
        <div class="arch-header arch-header--process">PROCESSAMENTO &mdash; Fun&ccedil;&otilde;es Core</div>
        <div class="arch-item">gerar_resistores()<br>S&eacute;rie base &times; d&eacute;cadas</div>
        <div class="arch-item">calcular_ganho_ca()<br>R1&#8214;R2 / (R3 + R1&#8214;R2)</div>
        <div class="arch-item">calcular_offset_cc()<br>(R3&#8214;R2 / (R1+R3&#8214;R2)) &times; Vcc</div>
        <div class="arch-item">circuito_valido()<br>5 crit&eacute;rios</div>
      </div>
      <div class="arch-col">
        <div class="arch-header arch-header--output">SA&Iacute;DA &mdash; Resultados</div>
        <div class="arch-item">pd.DataFrame()<br>circuitos_encontrados</div>
        <div class="arch-item">sort_values()<br>Vout_max descrescente</div>
        <div class="arch-item">display()<br>Tabela formatada</div>
      </div>
      <div class="arch-loop-banner">&#128260; Loop: 8000 itera&ccedil;&otilde;es &mdash; sorteio aleat&oacute;rio (Monte Carlo) com seed para reprodutibilidade</div>
    </div>
  </section>

  <!-- ================================================================
       SLIDE 10 — S&Eacute;RIE E24
       ================================================================ -->
  <section class="slide" data-slide="10">
    <span class="slide-number">10 / 15</span>
    <h1 class="slide-title">S&eacute;rie E24 &mdash; Resistores Comerciais</h1>

    <div class="two-col">
      <div>
        <div class="table-wrapper">
          <table>
            <thead>
              <tr>
                <th>Base</th><th>&times;1</th><th>&times;10</th><th>&times;100</th><th>&times;1k</th><th>&times;10k</th><th>&times;100k</th><th>&times;1M</th>
              </tr>
            </thead>
            <tbody>
              <tr><td><strong>10</strong></td><td>10 &Omega;</td><td>100 &Omega;</td><td>1 k&Omega;</td><td>10 k&Omega;</td><td>100 k&Omega;</td><td>1 M&Omega;</td><td>10 M&Omega;</td></tr>
