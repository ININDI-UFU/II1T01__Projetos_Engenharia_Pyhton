  <!-- ── Pyodide (Python in the browser) ──────────────────────────────── -->
  <script src="https://cdn.jsdelivr.net/pyodide/v0.26.1/full/pyodide.js"></script>
  <script>
    window._pyodideReady = false;
    window._pyodide       = null;

    async function _initPyodide() {
      try {
        window._pyodide = await loadPyodide();
        await window._pyodide.loadPackage(['pandas']);
        window._pyodideReady = true;
        console.log('[Pyodide] pronto (pandas carregado).');
      } catch (e) {
        console.error('[Pyodide] falhou ao carregar:', e);
      }
    }

    /** Chamada pelo Flutter: retorna true quando o Pyodide terminou de carregar. */
    function isPyodideReady() {
      return window._pyodideReady === true;
    }

    /**
     * runPythonCode(code) — async, stores result in window._pyResult.
     * getPyResult()       — sync, returns the stored JSON string.
     * Flutter awaits runPythonCode, then calls getPyResult to read output.
     * This avoids JSPromise<JSString> resolution bugs in dart:js_interop.
     */
    window._pyResult = null;

    async function runPythonCode(code) {
      window._pyResult = null;
      if (!window._pyodideReady || !window._pyodide) {
        window._pyResult = JSON.stringify({
          success: false,
          output: 'Pyodide ainda não está pronto. Aguarde a inicialização...'
        });
        return;
      }
      try {
        // Carrega pacotes necessários ANTES de redirecionar stdout
        await window._pyodide.loadPackagesFromImports(code);

        // Redirecionar stdout e stderr para um buffer único
        window._pyodide.runPython(`
import sys as __sys, io as __io
__buf = __io.StringIO()
__sys.stdout = __buf
__sys.stderr = __buf
`);

        let success = true;
        let errorMsg = '';
        try {
          window._pyodide.runPython(code);
        } catch (codeErr) {
          success = false;
          errorMsg = '\n[Exceção Python]\n' + (codeErr.message || String(codeErr));
        }

        const captured = window._pyodide.runPython('__buf.getvalue()');
        const combined = (captured || '') + errorMsg;
        window._pyResult = JSON.stringify({
          success: success,
          output: combined.trim() !== '' ? combined : '(sem saída)'
        });
      } catch (e) {
        window._pyResult = JSON.stringify({
          success: false,
          output: 'Erro interno: ' + (e.message || String(e))
        });
      }
    }

    function getPyResult() {
      return window._pyResult;
    }

    // Iniciar carregamento imediatamente
    _initPyodide();
  </script>
  <!-- ───────────────────────────────────────────────────────────────────── -->
</head>
<body>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:

  -->
  <script src="flutter_bootstrap.js" async></script>
</body>
